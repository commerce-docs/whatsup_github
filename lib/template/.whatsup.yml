---
# Parameters for a GitHub search query
base_branch: main

# The list of repositories to scan for pull requests.
# For GitHub Enterprise repos, prefix the repo with 'enterprise:'.
# Example: enterprise:my-org/my-repo
# Set WHATSUP_GITHUB_ENTERPRISE_HOSTNAME for GHE Server.
# Defaults to github.com (for GHEC).
repos:
  - my-org/my-repo

# Labels used to filter pull requests.
# 'required' labels must include the magic_word in the PR body.
# 'optional' labels are included when the magic_word is present.
labels:
  required:
    - major-update
  optional:
    - technical

# Format of output file
output_format:
  - yaml
#  - markdown

# The phrase used as a separator in the pull request description.
# All lines following this phrase are captured as 'description' in the output.
magic_word: whatsnew
